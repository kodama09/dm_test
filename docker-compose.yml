services:
  api:
    build:
      context: .
    container_name: user-registration-api
    environment:
      APP_ENV: ${APP_ENV:-local}
      POSTGRES_DB: ${POSTGRES_DB:-user_registration}
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-user_registration_password}
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-user_registration}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: user-registration-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-user_registration}
      POSTGRES_USER: ${POSTGRES_USER:-user_registration}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-user_registration_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-user_registration} -d ${POSTGRES_DB:-user_registration}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
